events {}

http {

  # Rate limiting (5 req/sec per IP)
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

  # Upstreams (use docker service names)
  upstream booking_service {
    server booking-service:3001;
  }

  upstream payment_service {
    server payment-service:3002;
  }

  upstream inventory_service {
    server inventory-service:3003;
  }

  server {
    listen 80;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Health check
    location /health {
      return 200 'OK';
    }

    # Booking service routes
    location /api/v1/bookings {
      limit_req zone=api_limit burst=10 nodelay;

      proxy_pass http://booking_service;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Payment service routes
    location /api/v1/payments {
      limit_req zone=api_limit burst=10 nodelay;

      proxy_pass http://payment_service;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Inventory service route
    location /api/v1/shows {
      limit_req zone=api_limit burst=10 nodelay;

      proxy_pass http://inventory_service;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # fallback
    location / {
      return 404;
    }
  }
}